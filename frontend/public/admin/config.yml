backend:
  name: git-gateway
  branch: main

media_folder: "frontend/public/images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "Restaurant Settings"
    files:
      - file: "frontend/public/content/settings.json"
        label: "Restaurant Info"
        name: "settings"
        fields:
          - { label: "Restaurant Name", name: "restaurantName", widget: "string" }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Instagram", name: "instagram", widget: "string", required: false }
          - label: "Opening Hours"
            name: "openingHours"
            widget: "list"
            fields:
              - { label: "Day", name: "day", widget: "string" }
              - { label: "Time", name: "time", widget: "string" }

  - name: "menu"
    label: "Menu"
    files:
      - file: "frontend/public/content/menu.json"
        label: "Menu Items"
        name: "menu"
        fields:
          - label: "Categories"
            name: "categories"
            widget: "list"
            fields:
              - { label: "Category Name", name: "name", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Price", name: "price", widget: "string" }
                  - { label: "Description", name: "description", widget: "string", required: false }

  - name: "gallery"
    label: "Gallery"
    files:
      - file: "frontend/public/content/gallery.json"
        label: "Gallery Images"
        name: "gallery"
        fields:
          - label: "Images"
            name: "images"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category", name: "category", widget: "string", required: false }
              - { label: "Image", name: "url", widget: "image" }