<!DOCTYPE html>
<html lang="de">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karo Kebab Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
margin:0;
padding:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#loginBox{
background:#1c1c1c;
padding:40px;
border-radius:10px;
width:320px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
margin-top:15px;
width:100%;
padding:10px;
background:#ff6a00;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff8800;
}

#dashboard{
display:none;
text-align:center;
padding:40px;
}

</style>

</head>

<body>

<div id="loginBox">

<h2>Admin Login</h2>

<input id="email" placeholder="E-Mail">

<input id="password" type="password" placeholder="Passwort">

<button onclick="login()">Einloggen</button>

<p id="status"></p>

</div>


<div id="dashboard">

<h1>Karo Kebab Admin</h1>

<p>Eingeloggt ✅</p>

<button onclick="logout()">Logout</button>

</div>


<script>

const supabaseUrl="https://qyryocrqmfurtswnirhq.supabase.co"
const supabaseKey="sb_publishable_w_JEAPUsj4A3lUvVI-QOoQ_AB67GjN3"

const supabase=window.supabase.createClient(supabaseUrl,supabaseKey)

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

document.getElementById("status").innerText="Wird geprüft..."

const { data, error } = await supabase.auth.signInWithPassword({
email:email,
password:password
})

if(error){
document.getElementById("status").innerText = error.message
return
}

document.getElementById("status").innerText="Login erfolgreich"

document.getElementById("loginBox").style.display="none"
document.getElementById("dashboard").style.display="block"

}

async function logout(){

await supabase.auth.signOut()

location.reload()

}

</script>

</body>
</html>
