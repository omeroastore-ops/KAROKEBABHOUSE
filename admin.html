<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin-Bereich</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

.wrap{
max-width:1100px;
margin:auto;
}

.card{
background:#1a1a1a;
border:1px solid #333;
border-radius:14px;
padding:16px;
margin-bottom:20px;
}

input,textarea,select,button{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #444;
background:#0f0f0f;
color:white;
box-sizing:border-box;
}

button{
background:#f97316;
border:none;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:0.9;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

.item{
padding:12px;
border:1px solid #333;
border-radius:12px;
margin-top:10px;
}

img.preview{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
display:block;
margin-top:10px;
}

.row{
display:flex;
gap:10px;
}

.row>*{
flex:1;
}

h1,h2,h3{
margin-top:0;
}

.muted{
color:#aaa;
font-size:14px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Admin-Bereich</h1>

<div class="card">

<h2>Anmeldung</h2>

<input id="email" type="email" placeholder="E-Mail">
<input id="password" type="password" placeholder="Passwort">

<div class="row">
<button id="loginBtn">Einloggen</button>
<button id="logoutBtn" type="button">Ausloggen</button>
</div>

<p id="authStatus" class="muted"></p>

</div>

<div class="grid">

<div class="card">

<h2>Website Einstellungen</h2>

<input id="restaurant_name" placeholder="Restaurantname">
<input id="phone" placeholder="Telefonnummer">
<input id="whatsapp" placeholder="WhatsApp">
<input id="address" placeholder="Adresse">

<input id="primary_color" placeholder="Primäre Farbe">
<input id="secondary_color" placeholder="Sekundäre Farbe">

<button id="saveSettingsBtn">Einstellungen speichern</button>

</div>

<div class="card">

<h2>Galeriebild hochladen</h2>

<input id="gallery_title" placeholder="Bildtitel">
<input id="gallery_category" placeholder="Bildkategorie">

<input id="gallery_file" type="file" accept="image/*">

<button id="uploadGalleryBtn">Bild hochladen</button>

<div id="galleryList"></div>

</div>

</div>

<div class="grid">

<div class="card">

<h2>Kategorie hinzufügen</h2>

<input id="category_name" placeholder="Kategoriename">

<input id="category_file" type="file" accept="image/*">

<button id="addCategoryBtn">Kategorie hinzufügen</button>

<div id="categoriesList"></div>

</div>

<div class="card">

<h2>Menüpunkt hinzufügen</h2>

<select id="item_category">
<option value="">Kategorie auswählen</option>
</select>

<input id="item_name" placeholder="Name des Gerichts">

<textarea id="item_description" placeholder="Beschreibung"></textarea>

<input id="item_price" placeholder="Preis">

<input id="item_file" type="file" accept="image/*">

<button id="addItemBtn">Menüpunkt hinzufügen</button>

<div id="menuItemsList"></div>

</div>

</div>

</div>

<script type="module" src="./js/admin.js"></script>

</body>
</html>
