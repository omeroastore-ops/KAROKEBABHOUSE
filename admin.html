<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karo Kebab Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      font-family:Arial,sans-serif;
      background:#111;
      color:#fff;
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .box{
      width:340px;
      background:#1c1c1c;
      border-radius:12px;
      padding:30px;
      box-shadow:0 0 20px rgba(0,0,0,.35);
    }
    h2,h1{margin-top:0}
    input{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      font-size:16px;
    }
    button{
      width:100%;
      margin-top:14px;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#ff7a00;
      color:#fff;
      font-weight:bold;
      font-size:16px;
      cursor:pointer;
    }
    button:hover{background:#ff922e}
    #status{
      margin-top:12px;
      min-height:24px;
      color:#ffb15c;
      font-size:14px;
      white-space:pre-wrap;
    }
    #dashboard{display:none;text-align:center}
  </style>
</head>
<body>

  <div id="loginBox" class="box">
    <h2>Admin Login</h2>
    <input id="email" type="email" placeholder="E-Mail" />
    <input id="password" type="password" placeholder="Passwort" />
    <button id="loginBtn" type="button">Einloggen</button>
    <p id="status">Seite geladen...</p>
  </div>

  <div id="dashboard" class="box">
    <h1>Karo Kebab Admin</h1>
    <p>Login erfolgreich ✅</p>
    <button id="logoutBtn" type="button">Logout</button>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const loginBox = document.getElementById('loginBox');
    const dashboard = document.getElementById('dashboard');

    statusEl.textContent = 'JavaScript läuft...';

    const supabaseUrl = 'https://qyryocrqmfurtswnirhq.supabase.co';
    const supabaseKey = 'sb_publishable_w_JEAPUsj4A3lUvVI-QOoQ_AB67GjN3';

    if (!window.supabase || !window.supabase.createClient) {
      statusEl.textContent = 'Fehler: Supabase Script wurde nicht geladen.';
    } else {
      statusEl.textContent = 'Bereit zum Einloggen.';
      const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

      loginBtn.addEventListener('click', async function () {
        statusEl.textContent = 'Button erkannt. Login läuft...';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
          statusEl.textContent = 'Bitte E-Mail und Passwort eingeben.';
          return;
        }

        try {
          const result = await supabase.auth.signInWithPassword({
            email: email,
            password: password
          });

          if (result.error) {
            statusEl.textContent = result.error.message;
            return;
          }

          loginBox.style.display = 'none';
          dashboard.style.display = 'block';
        } catch (e) {
          statusEl.textContent = 'Unerwarteter Fehler: ' + e.message;
        }
      });

      logoutBtn.addEventListener('click', async function () {
        await supabase.auth.signOut();
        location.reload();
      });
    }
  </script>

</body>
</html>
