<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karo Kebab Admin</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#111;
color:white;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#loginBox{
background:#1c1c1c;
padding:40px;
border-radius:10px;
width:320px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
width:100%;
margin-top:15px;
padding:12px;
background:#ff7a00;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ff9500;
}

#dashboard{
display:none;
text-align:center;
}

#status{
margin-top:10px;
color:orange;
}
</style>
</head>

<body>

<div id="loginBox">

<h2>Admin Login</h2>

<input id="email" placeholder="E-Mail">
<input id="password" type="password" placeholder="Passwort">

<button onclick="login()">Einloggen</button>

<p id="status"></p>

</div>

<div id="dashboard">

<h1>Karo Kebab Admin</h1>

<p>Login erfolgreich ✅</p>

<button onclick="logout()">Logout</button>

</div>

<script>

const supabaseUrl="https://qyryocrqmfurtswnirhq.supabase.co"
const supabaseKey="sb_publishable_w_JEAPUsj4A3lUvVI-QOoQ_AB67GjN3"

const supabase = window.supabase.createClient(supabaseUrl,supabaseKey)

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

document.getElementById("status").innerText="Prüfe Login..."

const {data,error}=await supabase.auth.signInWithPassword({
email:email,
password:password
})

if(error){
document.getElementById("status").innerText=error.message
return
}

window.location.href="panel.html?v=300"
}

async function logout(){

await supabase.auth.signOut()

location.reload()

}

</script>

</body>
</html>
