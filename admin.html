<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karo Kebab Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#0f0f0f;
      color:white;
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    #loginBox, #dashboard{
      background:#1c1c1c;
      padding:32px;
      border-radius:12px;
      width:340px;
      box-shadow:0 0 20px rgba(0,0,0,0.35);
    }

    #dashboard{
      display:none;
      text-align:center;
    }

    h2, h1{
      margin-top:0;
    }

    input{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      font-size:16px;
    }

    button{
      width:100%;
      margin-top:14px;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#ff7a00;
      color:white;
      font-weight:bold;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#ff8c1a;
    }

    #status{
      margin-top:12px;
      min-height:20px;
      color:#ffb366;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div id="loginBox">
    <h2>Admin Login</h2>

    <input id="email" type="email" placeholder="E-Mail" />
    <input id="password" type="password" placeholder="Passwort" />

    <button id="loginBtn" type="button">Einloggen</button>

    <p id="status"></p>
  </div>

  <div id="dashboard">
    <h1>Karo Kebab Admin</h1>
    <p>Eingeloggt ✅</p>
    <button id="logoutBtn" type="button">Logout</button>
  </div>

  <script>
    const supabaseUrl = "https://qyryocrqmfurtswnirhq.supabase.co";
    const supabaseKey = "sb_publishable_w_JEAPUsj4A3lUvVI-QOoQ_AB67GjN3";

    const clientFactory = window.supabase && window.supabase.createClient;
    const statusEl = document.getElementById("status");
    const loginBox = document.getElementById("loginBox");
    const dashboard = document.getElementById("dashboard");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    let supabase = null;

    if (!clientFactory) {
      statusEl.innerText = "Supabase konnte nicht geladen werden.";
      console.error("window.supabase.createClient not found");
    } else {
      supabase = clientFactory(supabaseUrl, supabaseKey);
      statusEl.innerText = "Bereit zum Einloggen.";
    }

    async function login() {
      if (!supabase) {
        statusEl.innerText = "Supabase ist nicht bereit.";
        return;
      }

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        statusEl.innerText = "Bitte E-Mail und Passwort eingeben.";
        return;
      }

      statusEl.innerText = "Anmeldung läuft...";

      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          statusEl.innerText = error.message;
          console.error(error);
          return;
        }

        console.log("Login success:", data);
        loginBox.style.display = "none";
        dashboard.style.display = "block";
      } catch (err) {
        statusEl.innerText = "Unerwarteter Fehler beim Login.";
        console.error(err);
      }
    }

    async function logout() {
      if (!supabase) return;

      await supabase.auth.signOut();
      dashboard.style.display = "none";
      loginBox.style.display = "block";
      statusEl.innerText = "Abgemeldet.";
    }

    loginBtn.addEventListener("click", login);
    logoutBtn.addEventListener("click", logout);
  </script>

</body>
</html>
